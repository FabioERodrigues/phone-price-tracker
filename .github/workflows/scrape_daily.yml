name: Daily Price Scraper

# This tells GitHub WHEN to run the script
on:
  schedule:
    - cron: '0 8 * * *' # Runs every day at 8:00 AM UTC
  workflow_dispatch: # Adds a button so you can run it manually anytime

# This tells GitHub HOW to run the script
jobs:
  scrape-and-save:
    runs-on: ubuntu-latest

    # We give the bot permission to write to your repository
    permissions:
      contents: write

    steps:
      # 1. Grab your code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 3. Install the packages from your text file
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Run the scraper script
      - name: Run scraper
        run: python src/scraper.py

      # 5. Commit the updated database back to the repository
      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/prices.db
          
          # Only commit if the database actually changed
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated data update: $(date +'%Y-%m-%d')" && git push)